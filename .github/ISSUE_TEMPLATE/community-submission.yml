name: Community submission
description: Suggest a new Caribbean tech community for the directory
title: "[Community] "
labels:
  - community-submission
body:
  - type: markdown
    attributes:
      value: |
        Thanks for submitting a community. After you send this form, the submission will be reviewed and validated. If validation succeeds, it will be added to the repository.

  - type: input
    id: community_name
    attributes:
      label: Community name
      placeholder: Caribbean AI Builders
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Country or scope
      options:
        - Regional
        - Antigua and Barbuda
        - Anguilla
        - Aruba
        - Bahamas
        - Barbados
        - Belize
        - Bonaire
        - British Virgin Islands
        - Cayman Islands
        - Cuba
        - Curacao
        - Dominica
        - Dominican Republic
        - Grenada
        - Guadeloupe
        - Guyana
        - Haiti
        - Jamaica
        - Martinique
        - Montserrat
        - Puerto Rico
        - Saba
        - Saint Barthelemy
        - Saint Eustatius
        - Saint Kitts and Nevis
        - Saint Lucia
        - Saint Martin
        - Saint Vincent and the Grenadines
        - Sint Maarten
        - Suriname
        - Trinidad and Tobago
        - Turks and Caicos Islands
        - U.S. Virgin Islands
    validations:
      required: true

  - type: input
    id: city
    attributes:
      label: City (optional)
      placeholder: Kingston

  - type: input
    id: language
    attributes:
      label: Primary language
      placeholder: English
    validations:
      required: true

  - type: input
    id: links
    attributes:
      label: Public links
      description: Provide one or more public URLs separated by commas, including website, invite, or profile links.
      placeholder: https://example.com, https://discord.gg/example, https://instagram.com/example

  - type: input
    id: focus
    attributes:
      label: Focus or audience
      description: Provide a comma-separated list of topics or audiences.
      placeholder: software engineering, startups, students
    validations:
      required: true

  - type: input
    id: member_count
    attributes:
      label: Approximate member count (optional)
      placeholder: "250"

  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: Community for Caribbean developers, founders, and students.
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Verification notes
      description: Explain how you know this submission is valid and appropriate to share.
      placeholder: I joined successfully on 2026-03-11, the public landing page is active, or the listed URLs are the official community links.
    validations:
      required: true
