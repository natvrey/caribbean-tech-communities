name: Directory submission
description: Submit a new Caribbean tech community or event, or update an existing listing.
title: "Community or event submission"
labels:
  - directory-submission
body:
  - type: markdown
    attributes:
      value: |
        Use this form to submit a new Caribbean tech community or event, or to update an existing listing if any information is outdated. After you send this form, the submission will be reviewed and validated. If validation succeeds, the repository will be updated.

  - type: dropdown
    id: listing_type
    attributes:
      label: Listing category
      description: Choose whether you are submitting a community or an event.
      options:
        - Community
        - Event
    validations:
      required: true

  - type: input
    id: listing_name
    attributes:
      label: Listing name
      placeholder: Caribbean AI Builders or Caribbean Dev Summit 2026
    validations:
      required: true

  - type: dropdown
    id: submission_type
    attributes:
      label: Submission type
      description: Choose whether you are submitting a new listing or updating information that is outdated.
      options:
        - Add a new listing
        - Update outdated information
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Country or scope
      options:
        - Regional
        - Antigua and Barbuda
        - Anguilla
        - Aruba
        - Bahamas
        - Barbados
        - Belize
        - Bonaire
        - British Virgin Islands
        - Cayman Islands
        - Cuba
        - Curacao
        - Dominica
        - Dominican Republic
        - Grenada
        - Guadeloupe
        - Guyana
        - Haiti
        - Jamaica
        - Martinique
        - Montserrat
        - Puerto Rico
        - Saba
        - Saint Barthelemy
        - Saint Eustatius
        - Saint Kitts and Nevis
        - Saint Lucia
        - Saint Martin
        - Saint Vincent and the Grenadines
        - Sint Maarten
        - Suriname
        - Trinidad and Tobago
        - Turks and Caicos Islands
        - U.S. Virgin Islands
    validations:
      required: true

  - type: input
    id: city
    attributes:
      label: City (optional)
      placeholder: Kingston

  - type: input
    id: language
    attributes:
      label: Primary language (required for communities)
      description: Communities should include a primary language. Events can leave this blank if not needed.
      placeholder: English

  - type: input
    id: links
    attributes:
      label: Public links
      description: Provide one or more public URLs separated by commas, including website, invite, or profile links.
      placeholder: https://example.com, https://discord.gg/example, https://instagram.com/example

  - type: input
    id: focus
    attributes:
      label: Focus or audience (required for communities)
      description: Provide a comma-separated list of topics or audiences for communities.
      placeholder: software engineering, startups, students

  - type: input
    id: member_count
    attributes:
      label: Approximate member count (optional)
      placeholder: "250"

  - type: input
    id: schedule
    attributes:
      label: Event date (optional)
      description: Use the actual event date or date range.
      placeholder: April 24, 2026 or April 24-26, 2026

  - type: input
    id: frequency
    attributes:
      label: Frequency (optional; for recurring events)
      description: Use this for recurrence information like annual, monthly, or recurring series.
      placeholder: Annual conference or Monthly meetup

  - type: input
    id: host_community
    attributes:
      label: Host community (optional)
      description: Add the community or organization most directly associated with the event.
      placeholder: SiliconCaribe

  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: Community for Caribbean developers, founders, and students, or an event description with enough detail to understand what it is.
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Verification notes
      description: Explain how you know this submission is valid and appropriate to share.
      placeholder: I joined successfully on 2026-03-11, the public landing page is active, or the listed URLs are the official community links.
    validations:
      required: true
