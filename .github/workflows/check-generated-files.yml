name: Check Generated Files

on:
  pull_request:
    paths:
      - "data/**"
      - "countries/**"
      - "dist/**"
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/**"
      - "README.md"
      - "CONTRIBUTING.md"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or commit to check"
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - "data/**"
      - "countries/**"
      - "dist/**"
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/**"
      - "README.md"
      - "CONTRIBUTING.md"
      - "package.json"
      - "package-lock.json"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  build:
    if: ${{ github.event_name != 'pull_request' || !startsWith(github.head_ref, 'automation/directory-submission-') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.event.pull_request.head.sha || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Validate dataset
        run: npm run validate

      - name: Generate directory pages
        run: npm run generate

      - name: Build static site
        run: npm run build:site

      - name: Run static site regression tests
        run: npm test

      - name: Ensure generated files are committed
        run: git diff --exit-code
