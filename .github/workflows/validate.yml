name: Validate

on:
  pull_request:
    paths:
      - "data/**"
      - "countries/**"
      - "scripts/**"
      - ".github/workflows/**"
      - "README.md"
      - "CONTRIBUTING.md"
      - "package.json"
  push:
    branches:
      - main
    paths:
      - "data/**"
      - "countries/**"
      - "scripts/**"
      - ".github/workflows/**"
      - "README.md"
      - "CONTRIBUTING.md"
      - "package.json"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate dataset
        run: npm run validate

      - name: Check community links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --verbose data/communities.json countries README.md CONTRIBUTING.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
