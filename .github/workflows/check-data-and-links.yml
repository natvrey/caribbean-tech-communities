name: Check Data And Links

on:
  pull_request:
    paths:
      - "data/**"
      - "countries/**"
      - "scripts/**"
      - ".github/workflows/**"
      - "README.md"
      - "CONTRIBUTING.md"
      - "package.json"
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or commit to validate"
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  validate:
    if: ${{ github.event_name == 'workflow_dispatch' || !startsWith(github.head_ref, 'automation/community-submission-') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.event.pull_request.head.sha || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Validate dataset
        run: npm run validate

      - name: Check community links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --verbose --accept 200,999,429 --exclude https://dhub.mdt.gov.tt data/communities.json countries README.md CONTRIBUTING.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
