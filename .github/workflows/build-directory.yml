name: Build Directory

on:
  pull_request:
    paths:
      - "data/**"
      - "countries/**"
      - "scripts/**"
      - ".github/workflows/**"
      - "README.md"
      - "CONTRIBUTING.md"
      - "package.json"
  push:
    branches:
      - main
    paths:
      - "data/**"
      - "countries/**"
      - "scripts/**"
      - ".github/workflows/**"
      - "README.md"
      - "CONTRIBUTING.md"
      - "package.json"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate dataset
        run: npm run validate

      - name: Generate directory pages
        run: npm run generate

      - name: Ensure generated files are committed
        run: git diff --exit-code
